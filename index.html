<!-- ==================== index.html ==================== -->
<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽学号系统 - 概率分布版</title>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="DrawStudentID.css">
    <link rel="stylesheet" href="Setting.css">
    <!-- MathJax for LaTeX rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="Setting.js"></script>
    <script src="DrawStudentID.js"></script>
</head>
<body>
    <!-- 模式选择 -->
    <select id="mode" class="mode-selector">
        <option value="default" selected>默认模式</option>
        <option value="flicker">闪烁模式🔥</option>
        <option value="distribution">概率分布📊</option>
        <option value="settings">系统设置</option>
    </select>

    <!-- 默认抽号界面 -->
    <div id="default" class="interface">
        <h1>学号抽取系统</h1>
        <div class="info-box">
            <span>当前班级人数：</span>
            <span id="currentTotal">1 - 52</span>
        </div>
        <button class="draw-btn" onclick="handleDefaultDraw()">立即抽取</button>
        <div id="DefaultResult" class="result-box"></div>
    </div>

    <!-- 闪烁抽号界面 -->
    <div id="flicker" class="interface">
        <h1>闪烁抽取模式</h1>
        <div class="info-box">
            <span>当前班级人数：</span>
            <span id="flickerTotal">1 - 52</span>
        </div>
        <button class="draw-btn" id="flickerBtn" onclick="handleFlickerDraw()">开始闪烁</button>
        <div id="FlickerResult" class="result-box"></div>
    </div>

    <!-- 概率分布界面 -->
    <div id="distribution" class="interface distribution-interface">
        <h1>概率分布模式</h1>
        <div class="distribution-layout">
            <!-- 左侧菜单 -->
            <div class="dist-sidebar">
                <h3>📊 选择分布类型</h3>
                <div id="distributionMenu" class="dist-menu"></div>
            </div>
            
            <!-- 右侧公式显示区 -->
            <div class="dist-main">
                <div class="dist-formula-display" onclick="openDistDetail()">
                    <h3>当前选中：<span id="currentDistName">均匀分布</span></h3>
                    <div class="formula-box" id="formulaBox">
                        $$P(X=x) = \frac{1}{b-a+1}, \quad x \in [a,b]$$
                    </div>
                    <div class="click-hint">👆 点击查看详细解释</div>
                </div>
                
                <div class="dist-action">
                    <button class="draw-btn" onclick="handleDistributionDraw()">
                        🎲 使用当前分布抽取
                    </button>
                    <div id="DistributionResult" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="mask" class="modal-mask"></div>
    <div id="settingsModal" class="settings-modal">
        <div class="modal-header">
            <h2>⚙️ 系统设置</h2>
            <span class="close-btn" onclick="closeSettings()">&times;</span>
        </div>
        <div class="modal-body">
            <label>班级人数设置：
                <br>
                <label for="min">最小值:</label>
                <input type="number" id="MinTotalStudents" min="1" max="100000000" value="1" class="num-input" name="min">
                <br>
                <label for="max">最大值:</label>
                <input type="number" id="MaxTotalStudents" min="1" max="100000000" value="52" class="num-input" name="max">
            </label>
            <br>
            <label>闪烁速度设置：
                <input type="number" id="fast" min="1" value="50" class="num-input">
            </label>
            <label>抖动范围设置（防重复）：
                <input type="number" id="jitterRange" min="0" max="20" value="5" class="num-input">
                <small>建议5-10，0表示关闭</small>
            </label>
            <div class="download-section">
                <button class="download-btn" onclick="downloadSourceCode()">
                    <span>📥 下载源代码</span>
                    <div class="hint">包含HTML/CSS/JS文件</div>
                    <div class="hint">小tips:https://github.com/WuiQeFan/DrawingStudentsID 也可下载</div>
                </button>
            </div>
            <div class="btn-group">
                <button class="confirm-btn" onclick="saveSettings()">✅ 保存设置</button>
                <button class="cancel-btn" onclick="closeSettings()">❌ 取消</button>
            </div>
        </div>
    </div>

    <!-- 分布详情弹窗（新增） -->
    <div id="distDetailMask" class="modal-mask"></div>
    <div id="distDetailModal" class="settings-modal dist-detail-modal">
        <div class="modal-header">
            <h2 id="detailTitle">📐 均匀分布详解</h2>
            <span class="close-btn" onclick="closeDistDetail()">&times;</span>
        </div>
        <div class="modal-body" id="detailBody">
            <!-- 动态内容 -->
        </div>
    </div>
</body>
</html>
